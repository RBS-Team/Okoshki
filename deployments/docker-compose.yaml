version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: okoshki-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d okoshki_db"]
      interval: 2s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    container_name: okoshki-migrate
    volumes:
      - ../migrations:/migrations
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
  