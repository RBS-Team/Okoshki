version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: okoshki-db
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: okoshki_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d okoshki_db"]
      interval: 2s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    container_name: okoshki-migrate
    volumes:
      - ./migrations:/migrations
    command: [ "-path", "/migrations", "-database", "postgres://dev_user:dev_password@db:5432/okoshki_db?sslmode=disable", "up" ]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data: