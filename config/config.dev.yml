auth:
  http:
    port: "8080"
    readTimeout: 5s
    writeTimeout: 10s
    idleTimeout: 60s
    shutdownTimeout: 15s
    cors:
      allowedOrigins:
        - "http://localhost:8080"
        - "http://localhost:8000"
      allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
      allowedHeaders: ["Content-Type", "Authorization", "X-CSRF-Token"]
      allowCredentials: true
    auth:
      jwt:
        secretKey: "dev-jwt-secret"
        accessTokenTTL: 720h
      csrf:
        secretKey: "Jn4616nw/oC0q5iJzAyRQoKCKCG20aJejiKgYlTTO6E="
        tokenTTL: 15m
  grpc:
    port: "9001"
  logger:
    level: "debug"
    mode: "dev"

db:
  host: "localhost"
  port: 5432
  user: "dev_user"
  password: "dev_password"
  dbName: "okoshki_db"
  sslmode: "disable"
  maxOpenConns: 25
  maxIdleConns: 25
  connMaxLifetime: 5m
