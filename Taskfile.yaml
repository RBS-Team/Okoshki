version: '3'
dotenv: ['.env']
# Глобальные переменные проекта
env:
  PROJECT_ROOT: '{{.ROOT_DIR}}'

vars:
  GO_VERSION: '1.26'
  GOLANGCI_LINT_VERSION: 'v2.8.0'
  GCI_VERSION: 'v0.13.7'
  GOFUMPT_VERSION: 'v0.9.2'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'



tasks:
  install-formatters:
    desc: "Устанавливает форматтеры gci и gofumpt в ./bin"
    cmds:
      - |
        [ -f {{.GOFUMPT}} ] || {
          echo '📦 Устанавливаем gofumpt {{.GOFUMPT_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
        }
        [ -f {{.GCI}} ] || {
          echo '📦 Устанавливаем gci {{.GCI_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
        }
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  format:
    desc: "Форматирует весь проект gofumpt + gci"
    deps: [ install-formatters ]
    cmds:
      - |
        echo "🧼 Форматируем через gofumpt ..."
        find . -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GOFUMPT}} -extra -w {} +
      - |
        echo "🎯 Сортируем импорты через gci ..."
        find . -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GCI}} write -s standard -s default -s "prefix(github.com/RBS-Team/Okoshki/)" {} +

  install-golangci-lint:
    desc: "Устанавливает golangci-lint в каталог bin"
    cmds:
      - |
        [ -f {{.GOLANGCI_LINT}} ] || {
          mkdir -p {{.BIN_DIR}}
          echo "📦 Устанавливаем golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
          GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
        }
    status:
      - test -x {{.GOLANGCI_LINT}}

  lint:
    desc: "Запускает golangci-lint для всех модулей"
    deps: [ install-golangci-lint ]
    cmds:
      - '{{.GOLANGCI_LINT}} run ./... --config=.golangci.yml'
  
  generate:
    aliases:
      - gen
    desc: "Generate code from proto files"
    cmds:
      - protoc -I proto proto/sso/*.proto --go_out=./proto --go_opt=paths=source_relative --go-grpc_out=./proto --go-grpc_opt=paths=source_relative
  
  env-up-sso:
    desc: "Поднимает докер с БД для сервиса sso"
    cmds:
      - docker compose -f deployments/docker-compose.yaml up -d sso-db

  env-down-sso:
    cmds:
      - docker compose -f deployments/docker-compose.yaml down sso-db
  
  env-cleanup-sso:
    silent: true
    cmds:
      - | 
        read -p "Очистить все volume файлы окружения? ОПАСНОСТЬ утери данных. [y/N]:" ans; 
        if [ "$ans" = "y" ]; then 
          docker compose -f deployments/docker-compose.yaml down sso-db && 
          sudo rm -rf out/sso_pg_data && 
          echo "Файлы окружения очищены"; 
        else 
          echo "Очистка окружения отменена"; 
        fi

  migrate-create-sso:
    silent: true
    vars:
      seq: '{{.seq}}'
    cmds:
      - |
        if [ -z "{{.seq}}" ]; then
          echo "Отсутствует необходимый параметр seq. Пример: task migrate-create-sso seq=init";
          exit 1;
        fi;
        docker compose -f deployments/docker-compose.yaml run --rm sso-db-migrate create -ext sql -dir /migrations -seq {{.seq}}

  migrate-up-sso:
    cmds:
      - migrate-action-sso action=up
  migrate-down-sso:
    cmds:
      - migrate-action-sso action=down
    

  migrate-action-sso:
    silent: true
    cmds:
      - |
        if [ -z "{{.action}}" ]; then
          echo "Отсутствует необходимый параметр action. Пример: task migrate-create-sso action=up";
          exit 1;
        fi;
        docker compose -f deployments/docker-compose.yaml run --rm sso-db-migrate \
        -path /migrations \
        -database "postgres://{{.DB_USER_SSO}}:{{.DB_PASSWORD_SSO}}@sso-db:5432/{{.DB_NAME_SSO}}?sslmode=disable" \
        {{.action}}

